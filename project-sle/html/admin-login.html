<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sustainable Living</title>
    <link rel="stylesheet" href="css/admin-login.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #2a1515 0%, #1a0f0f 100%);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 450px;
        }

        .back-button {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: translateX(-5px);
            opacity: 0.9;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        body.dark .login-container {
            background: #1e1e1e;
            color: #e0e0e0;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 700;
        }

        body.dark .login-header h1 {
            color: #e0e0e0;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        body.dark .login-header p {
            color: #b0b0b0;
        }

        .security-alert {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #856404;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        body.dark .security-alert {
            background: #664d03;
            color: #ffc107;
            border-left-color: #ff9800;
        }

        .security-alert-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        body.dark .form-group label {
            color: #e0e0e0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            font-size: 18px;
            color: #95a5a6;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #2c3e50;
        }

        body.dark .form-group input {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #444;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e74c3c;
            background: white;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }

        body.dark .form-group input:focus {
            background: #333;
        }

        .form-group input::placeholder {
            color: #95a5a6;
        }

        body.dark .form-group input::placeholder {
            color: #666;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .remember-me label {
            margin: 0;
            color: #7f8c8d;
            cursor: pointer;
            user-select: none;
        }

        body.dark .remember-me label {
            color: #b0b0b0;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .warning-text {
            text-align: center;
            color: #c0392b;
            font-size: 13px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        body.dark .warning-text {
            background: #3a1f1f;
            color: #ff6b6b;
        }

        .error-message {
            background: #fee;
            color: #c0392b;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #c0392b;
        }

        body.dark .error-message {
            background: #3a1f1f;
            border-left-color: #ff6b6b;
        }

        .dark-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .dark-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 26px;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

<button class="dark-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">🌙</button>

<div class="auth-wrapper">
    <a href="login.html" class="back-button">← Back</a>

    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">🔐</div>
            <h1>Admin Login</h1>
            <p>Secure administrator access</p>
        </div>

        <div class="security-alert">
            <span class="security-alert-icon">⚠️</span>
            <span>Authorized personnel only. All access is logged and monitored.</span>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form onsubmit="return adminLogin()">
            <div class="form-group">
                <label for="adminId">Admin ID</label>
                <div class="input-wrapper">
                    <span class="input-icon">🆔</span>
                    <input type="text" id="adminId" placeholder="Enter your admin ID" required>
                </div>
            </div>

            <div class="form-group">
                <label for="adminPass">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="adminPass" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
            </div>

            <button type="submit" class="login-button">Access Admin Dashboard</button>
        </form>

        <div class="warning-text">
            ⚠️ Unauthorized access attempts are recorded
        </div>
    </div>
</div>

<script src="js/modal.js"></script>
<script src="js/admin-login.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('darkMode', isDark);
        updateDarkToggleButton();
    }

    function updateDarkToggleButton() {
        const btn = document.querySelector('.dark-toggle');
        if (btn) {
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️';
                btn.title = 'Switch to Bright Mode';
            } else {
                btn.textContent = '🌙';
                btn.title = 'Switch to Dark Mode';
            }
        }
    }

    // Load dark mode preference
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
    }
    updateDarkToggleButton();

    // Remember me functionality
    window.addEventListener('load', function() {
        if (localStorage.getItem('adminRememberMe') === 'true') {
            document.getElementById('rememberMe').checked = true;
            document.getElementById('adminId').value = localStorage.getItem('rememberedAdminId') || '';
        }
    });

    // Override the adminLogin function to add remember me
    const originalAdminLogin = window.adminLogin;
    window.adminLogin = function() {
        if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('adminRememberMe', 'true');
            localStorage.setItem('rememberedAdminId', document.getElementById('adminId').value);
        } else {
            localStorage.removeItem('adminRememberMe');
            localStorage.removeItem('rememberedAdminId');
        }
        return originalAdminLogin ? originalAdminLogin() : true;
    };
</script>

</body>
</html>
